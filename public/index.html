<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse products using keyset pagination.">
  <title>Products Catalogue</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #333333;
      background-color: #ffffff;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #111111;
    }

    /* Filters Layout */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
      padding: 15px;
      background-color: #f9f9f9;
      border: 1px solid #e5e5e5;
      border-radius: 4px;
      font-size: 14px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      font-weight: 500;
      color: #666666;
    }

    select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #ffffff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: #0066cc;
    }

    .meta-info {
      margin-left: auto;
      color: #666666;
      display: flex;
      gap: 15px;
    }

    code {
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      background-color: #eaeaea;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      max-width: 150px;
      display: inline-block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* Table Design */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
    }

    th {
      text-align: left;
      padding: 12px;
      border-bottom: 2px solid #dddddd;
      color: #444444;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eeeeee;
      font-size: 14px;
    }

    tr:hover td {
      background-color: #f5f5f5;
    }

    .price-col {
      font-weight: 500;
      color: #111111;
    }

    .date-col {
      color: #666666;
    }

    .id-col {
      font-family: SFMono-Regular, Consolas, monospace;
      color: #888888;
      font-size: 12px;
    }

    /* Empty state */
    .empty-state {
      padding: 40px 10px;
      text-align: center;
      color: #888888;
      font-size: 14px;
      border: 1px dashed #cccccc;
      border-radius: 4px;
    }

    /* Button Layout */
    .action-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    button {
      padding: 8px 18px;
      background-color: #ffffff;
      border: 1px solid #cccccc;
      border-radius: 4px;
      color: #333333;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      outline: none;
      transition: background-color 0.1s, border-color 0.1s;
    }

    button:hover:not(:disabled) {
      background-color: #f0f0f0;
      border-color: #adadad;
    }

    button:disabled {
      color: #bbbbbb;
      background-color: #fdfdfd;
      border-color: #e5e5e5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>Products</h1>

  <!-- Top Filters & Stats -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="category-select">Category:</label>
      <select id="category-select">
        <option value="">All Categories</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="limit-select">Page Size:</label>
      <select id="limit-select">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>

    <div class="meta-info">
      <span>Total Loaded: <strong id="stat-count">0</strong></span>
      <span>Next Cursor: <code id="stat-cursor">-</code></span>
    </div>
  </div>

  <!-- Catalogue Table -->
  <table id="products-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Created At</th>
        <th>ID</th>
      </tr>
    </thead>
    <tbody id="products-tbody">
      <!-- Data injected here -->
    </tbody>
  </table>

  <div id="empty-notice" class="empty-state" style="display: none;">
    No products found.
  </div>

  <!-- Pagination Button -->
  <div class="action-container">
    <button id="load-more-btn">Load more</button>
  </div>

  <script>
    let nextCursor = null;
    let productsCount = 0;
    let selectedCategory = '';
    let pageLimit = 20;

    const categorySelect = document.getElementById('category-select');
    const limitSelect = document.getElementById('limit-select');
    const productsTbody = document.getElementById('products-tbody');
    const emptyNotice = document.getElementById('empty-notice');
    const loadMoreBtn = document.getElementById('load-more-btn');
    const statCount = document.getElementById('stat-count');
    const statCursor = document.getElementById('stat-cursor');

    window.addEventListener('DOMContentLoaded', () => {
      fetchCategories();
      loadProducts(true);
    });

    categorySelect.addEventListener('change', (e) => {
      selectedCategory = e.target.value;
      loadProducts(true);
    });

    limitSelect.addEventListener('change', (e) => {
      pageLimit = parseInt(e.target.value, 10);
      loadProducts(true);
    });

    loadMoreBtn.addEventListener('click', () => {
      if (!loadMoreBtn.disabled) {
        loadProducts(false);
      }
    });

    async function fetchCategories() {
      try {
        const res = await fetch('/categories');
        const data = await res.json();
        if (data.categories) {
          data.categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categorySelect.appendChild(option);
          });
        }
      } catch (err) {
        console.error('Error fetching categories:', err);
      }
    }

    async function loadProducts(reset = false) {
      if (reset) {
        productsCount = 0;
        nextCursor = null;
        productsTbody.innerHTML = '';
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load more';
      }

      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading...';

      let url = `/products?limit=${pageLimit}`;
      if (selectedCategory) {
        url += `&category=${encodeURIComponent(selectedCategory)}`;
      }
      if (nextCursor) {
        url += `&cursor=${nextCursor}`;
      }

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.data && data.data.length > 0) {
          emptyNotice.style.display = 'none';
          renderRows(data.data);
          
          nextCursor = data.next_cursor;
          productsCount += data.data.length;
          
          statCount.textContent = productsCount.toLocaleString();
          statCursor.textContent = nextCursor || 'None';

          if (!nextCursor) {
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = 'End of catalogue';
          } else {
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = 'Load more';
          }
        } else {
          if (reset) {
            emptyNotice.style.display = 'block';
            statCount.textContent = '0';
            statCursor.textContent = 'None';
          }
          loadMoreBtn.disabled = true;
          loadMoreBtn.textContent = 'No products found';
        }
      } catch (err) {
        console.error('Error loading products:', err);
        loadMoreBtn.textContent = 'Error loading data';
      }
    }

    function renderRows(products) {
      const fragment = document.createDocumentFragment();

      products.forEach(p => {
        const tr = document.createElement('tr');
        
        // Format ISO date simply
        const date = new Date(p.created_at);
        const formattedDate = date.toISOString().replace('T', ' ').substring(0, 19);
        const price = parseFloat(p.price).toFixed(2);

        tr.innerHTML = `
          <td><strong>${escape(p.name)}</strong></td>
          <td>${escape(p.category)}</td>
          <td class="price-col">$${price}</td>
          <td class="date-col">${formattedDate}</td>
          <td class="id-col">${p.id}</td>
        `;
        fragment.appendChild(tr);
      });

      productsTbody.appendChild(fragment);
    }

    function escape(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[tag] || tag));
    }
  </script>
</body>
</html>
